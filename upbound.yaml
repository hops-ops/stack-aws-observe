apiVersion: meta.dev.upbound.io/v2alpha1
kind: Project
metadata:
  name: stack-aws-observe
spec:
  dependsOn:
  - apiVersion: pkg.crossplane.io/v1
    kind: Function
    package: xpkg.crossplane.io/crossplane-contrib/function-auto-ready
    version: '>=v0.6.1'
  - apiVersion: pkg.crossplane.io/v1
    kind: Configuration
    package: ghcr.io/hops-ops/stack-observe
    version: '>=v0.6.0'
  - apiVersion: pkg.crossplane.io/v1
    kind: Configuration
    package: ghcr.io/hops-ops/aws-pod-identity
    version: '>=v0.7.0'
  - apiVersion: pkg.crossplane.io/v1
    kind: Provider
    package: xpkg.crossplane.io/crossplane-contrib/provider-aws-s3
    version: '>=v2.4.0'
  description: Deploys the Observe stack with AWS Pod Identity for OpenCost billing
    access.
  license: Apache-2.0
  maintainer: Patrick Lee Scott <pat@patscott.io>
  readme: |
    # stack-aws-observe

    Deploys the Observe stack (Prometheus, Loki, Tempo, k8s-monitoring/OpenCost,
